app = 'smoke-test-russet-meadow-6331'
primary_region = 'arn'

[build]
  [build.args]
    GO_VERSION = '1.23.5'

[env]
  PORT = '8090'

[[services]]
  internal_port = 8090
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[services.ports]]
    port = 8090
    handlers = []

[[vm]]
  memory = '1gb'
  cpus = 1
